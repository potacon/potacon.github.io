<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>potacon Apps</title>
  <style>
    :root {
      --bg: #fff7f0;
      --surface: #fffdf9;
      --text: #2e2115;
      --muted: #70543a;
      --border: #f0ded6;
      --accent: #ff7a68;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .hero,
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 32px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    p {
      margin: 0 0 12px;
    }

    ul {
      margin: 0 0 0 18px;
      padding: 0;
    }

    a {
      color: #9b4f2a;
      font-weight: 700;
      word-break: break-all;
    }

    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>potacon Apps</h1>
      <p>potacon이 만든 앱을 소개하는 개발자 페이지입니다.</p>
      <p class="muted">현재 공개 앱 목록에는 Flamingo가 포함되어 있으며, 이후 다른 앱이 추가될 수 있습니다.</p>
    </section>

    <section class="card">
      <h2>앱 목록</h2>
      <ul>
        <li><a href="https://potacon.github.io/flamingo/">Flamingo - 일본어 한자 학습 앱</a></li>
      </ul>
    </section>

    <section class="card">
      <h2>정책</h2>
      <p><a href="https://potacon.github.io/flamingo/privacy-policy.html">Flamingo 개인정보처리방침</a></p>
      <p class="muted">광고 제공을 위해 Google AdMob이 사용될 수 있습니다.</p>
    </section>

    <section class="card">
      <h2>문의</h2>
      <p>문의 이메일: <a href="mailto:hun8529@naver.com">hun8529@naver.com</a></p>
    </section>
  </main>
</body>
</html>
